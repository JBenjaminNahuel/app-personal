<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Semanal PRO</title>
<style>
body{font-family:Arial;background:#0f172a;color:white;margin:0}
.container{width:90%;margin:auto;padding:10px}
.card{background:#1e293b;padding:10px;border-radius:15px;margin-bottom:10px}
.headerSemana{text-align:center;margin-bottom:10px;font-weight:bold}
.week{display:flex;justify-content:space-between;gap:5px}
.day{background:#334155;padding:8px;border-radius:10px;flex:1;text-align:center;cursor:pointer}
.day.selected{background:#22c55e}
.nombreDia{font-size:10px;color:#94a3b8}
.numeroDia{font-size:16px;font-weight:bold}
.event{font-size:10px;margin-top:4px;padding:4px;border-radius:5px}
button{padding:8px;border:none;border-radius:8px;background:#22c55e;color:white}
.nav{display:flex;justify-content:space-between;margin-bottom:10px}
input,select{width:100%;padding:10px;margin:5px 0;border:none;border-radius:8px}
</style>
</head>
<body>
<div class="container">

<div class="card">
  <div class="headerSemana" id="tituloSemana"></div>
  <div class="nav">
    <button onclick="cambiarSemana(-7)">⬅️</button>
    <button onclick="irHoy()">HOY</button>
    <button onclick="cambiarSemana(7)">➡️</button>
  </div>
  <div class="week" id="semana"></div>
</div>

<div class="card">
  <h3>➕ Evento</h3>
  <input type="time" id="hora">
  <input type="text" id="titulo" placeholder="Evento">
  <select id="tipo">
    <option value="unico">Único</option>
    <option value="semanal">Semanal</option>
  </select>
  <button onclick="agregarEvento()">Guardar</button>
</div>

</div>

<script>
let eventos = JSON.parse(localStorage.getItem('eventos')) || [];
let fechaBase = new Date();
let diaSeleccionado = null;

const dias = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];

function formatearFecha(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function generarSemana(){
  const cont = document.getElementById('semana');
  cont.innerHTML = "";

  const inicio = new Date(fechaBase);
  inicio.setDate(inicio.getDate() - inicio.getDay() + 1);

  let fin = new Date(inicio);
  fin.setDate(inicio.getDate()+6);

  document.getElementById('tituloSemana').innerText = `${formatearFecha(inicio)} - ${formatearFecha(fin)}`;

  for(let i=0;i<7;i++){
    const d = new Date(inicio);
    d.setDate(inicio.getDate()+i);

    const fecha = formatearFecha(d);

    const div = document.createElement('div');
    div.className = 'day';
    div.innerHTML = `
      <div class="nombreDia">${dias[d.getDay()]}</div>
      <div class="numeroDia">${d.getDate()}</div>
      <div id="e${fecha}"></div>
    `;

    div.onclick = ()=>{
      document.querySelectorAll('.day').forEach(x=>x.classList.remove('selected'));
      div.classList.add('selected');
      diaSeleccionado = fecha;
    }

    cont.appendChild(div);
  }

  mostrarEventos();
}

function cambiarSemana(dias){
  fechaBase.setDate(fechaBase.getDate()+dias);
  generarSemana();
}

function irHoy(){
  fechaBase = new Date();
  generarSemana();
}

function agregarEvento(){
  if(!diaSeleccionado) return alert("Elegí un día");

  const hora = document.getElementById('hora').value;
  const titulo = document.getElementById('titulo').value;
  const tipo = document.getElementById('tipo').value;

  if(!hora || !titulo) return alert("Completá todo");

  const partes = diaSeleccionado.split('-');
  const d = new Date(partes[0], partes[1]-1, partes[2]);
  const diaSemana = d.getDay();

  eventos.push({fecha: diaSeleccionado, hora, titulo, tipo, diaSemana});

  localStorage.setItem('eventos', JSON.stringify(eventos));
  generarSemana();
}

function mostrarEventos(){
  document.querySelectorAll('[id^="e"]').forEach(el=> el.innerHTML = '');

  let mapa = {};

  const inicio = new Date(fechaBase);
  inicio.setDate(inicio.getDate() - inicio.getDay() + 1);

  eventos.forEach((e,i)=>{
    if(e.tipo==='unico'){
      if(!mapa[e.fecha]) mapa[e.fecha]=[];
      mapa[e.fecha].push(e);
    }

    if(e.tipo==='semanal'){
      const d = new Date(inicio);
      d.setDate(inicio.getDate() + (e.diaSemana===0?6:e.diaSemana-1));
      const f = formatearFecha(d);

      if(!mapa[f]) mapa[f]=[];
      mapa[f].push(e);
    }
  });

  Object.keys(mapa).forEach(fecha=>{
    mapa[fecha].sort((a,b)=> a.hora.localeCompare(b.hora));

    const box = document.getElementById('e'+fecha);
    if(box){
      mapa[fecha].forEach(e=>{
        box.innerHTML += `<div class="event">${e.hora} ${e.titulo}</div>`;
      });
    }
  });
}

fechaBase = new Date();
generarSemana();
</script>
</body>
</html>
